<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentOS | Sleek Growth Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- SLEEK SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-container">
            <i data-lucide="zap" style="width: 32px; height: 32px;"></i>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link active"><i data-lucide="layout-dashboard"></i></a></li>
            <li><a href="tasks.html" class="nav-link"><i data-lucide="check-square"></i></a></li>
            <li><a href="habits.html" class="nav-link"><i data-lucide="calendar"></i></a></li>
            <li><a href="analytics.html" class="nav-link"><i data-lucide="bar-chart-2"></i></a></li>
            <li><a href="gamification.html" class="nav-link"><i data-lucide="award"></i></a></li>
        </ul>
        
        <div style="margin-top: auto;">
            <a href="#" class="nav-link"><i data-lucide="settings"></i></a>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <div class="main-content">
        <!-- TOP BAR -->
        <header class="top-bar">
            <div class="search-container">
                <i data-lucide="search" style="width: 18px;"></i>
                <input type="text" placeholder="Search tasks, habits, or stats...">
            </div>
            
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="text-align: right;">
                    <div id="username" style="font-weight: 600; font-size: 0.9rem;">Student Alpha</div>
                    <div id="user-level" style="font-size: 0.75rem; color: var(--text-muted);">Level 5</div>
                </div>
                <div style="width: 40px; height: 40px; background: var(--primary-light); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">
                    SA
                </div>
            </div>
        </header>

        <!-- HERO BANNER -->
        <section class="hero-banner">
            <div class="hero-content">
                <h2 style="font-family: 'Outfit'; font-size: 1.5rem; margin-bottom: 0.5rem;">Weekly Productivity Peak</h2>
                <p class="text-muted text-small" style="margin-bottom: 1.5rem;">Your efficiency has increased by 15% this week. Keep maintaining your streaks!</p>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div style="flex: 1;">
                        <div style="height: 6px; background: var(--bg-main); border-radius: 3px; overflow: hidden;">
                            <div id="xp-bar" style="height: 100%; background: var(--primary); width: 65%;"></div>
                        </div>
                    </div>
                    <span class="text-small" style="font-weight: 600;" id="xp-ratio">1250 / 2000 XP</span>
                </div>
            </div>
        </section>

        <!-- DASHBOARD FEED -->
        <main class="content-area">
            <nav class="segmented-control">
                <div class="tab active">Overview</div>
                <div class="tab">Activity</div>
                <div class="tab">Reports</div>
            </nav>

            <div class="grid">
                <!-- Task Card -->
                <article class="card">
                    <div class="card-title">
                        <i data-lucide="list-todo" style="color: var(--primary);"></i>
                        Upcoming Tasks
                    </div>
                    <div id="dashboard-tasks">
                        <!-- Wakas will populate this -->
                        <div class="text-muted text-small">Loading your schedule...</div>
                    </div>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;" onclick="location.href='tasks.html'">Open Worklist</button>
                </article>

                <!-- Habit Card -->
                <article class="card">
                    <div class="card-title">
                        <i data-lucide="flame" style="color: #f97316;"></i>
                        Active Streaks
                    </div>
                    <div id="dashboard-habits">
                        <!-- Ayesh will populate this -->
                        <div class="text-muted text-small">Crunching numbers...</div>
                    </div>
                    <button class="btn" style="width: 100%; margin-top: 1.5rem; background: var(--primary-light); color: var(--primary);" onclick="location.href='habits.html'">Check Habits</button>
                </article>

                <!-- Status Card -->
                <article class="card">
                    <div class="card-title">
                        <i data-lucide="trending-up" style="color: var(--primary);"></i>
                        Quick Stats
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 1rem;">
                        <div style="display: flex; justify-content: space-between;">
                            <span class="text-muted text-small">Tasks Finished</span>
                            <span style="font-weight: 600;">45</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span class="text-muted text-small">Habit Score</span>
                            <span style="font-weight: 600;">82%</span>
                        </div>
                    </div>
                </article>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
