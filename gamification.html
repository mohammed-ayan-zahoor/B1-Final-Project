<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentOS | Rewards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .level-badge {
            width: 120px;
            height: 120px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            font-family: 'Outfit';
            margin: 0 auto 1.5rem;
            border: 4px solid white;
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-container"><i data-lucide="zap" style="width: 32px; height: 32px;"></i></div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link"><i data-lucide="layout-dashboard"></i></a></li>
            <li><a href="tasks.html" class="nav-link"><i data-lucide="check-square"></i></a></li>
            <li><a href="habits.html" class="nav-link"><i data-lucide="calendar"></i></a></li>
            <li><a href="analytics.html" class="nav-link"><i data-lucide="bar-chart-2"></i></a></li>
            <li><a href="gamification.html" class="nav-link active"><i data-lucide="award"></i></a></li>
        </ul>
        <div style="margin-top: auto;"><a href="#" class="nav-link"><i data-lucide="settings"></i></a></div>
    </aside>

    <div class="main-content">
        <header class="top-bar">
            <div class="search-container">
                <i data-lucide="search" style="width: 18px;"></i>
                <input type="text" placeholder="Search rewards...">
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="text-align: right;">
                    <div id="username" style="font-weight: 600; font-size: 0.9rem;">Student Alpha</div>
                    <div id="user-level" style="font-size: 0.75rem; color: var(--text-muted);">Level 5</div>
                </div>
                <div style="width: 40px; height: 40px; background: var(--primary-light); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">SA</div>
            </div>
        </header>

        <main class="content-area" style="padding-top: 2rem;">
            <div style="margin-bottom: 2rem;">
                <h1 style="font-family: 'Outfit'; font-size: 2rem;">Rewards & XP</h1>
                <p class="text-muted">Himanshu, manage the leveling system and rewards logic.</p>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr;">
                <div class="card" style="text-align: center; padding: 3rem;">
                    <div class="level-badge" id="current-level-display">5</div>
                    <h3 class="card-title" style="justify-content: center;">Current Standing</h3>
                    <p class="text-muted text-small" id="xp-description" style="margin-bottom: 2rem;">You need 750 more XP to reach Level 6</p>
                    
                    <button class="btn btn-primary" id="claim-reward-btn" style="padding: 0.75rem 2rem;">Claim Daily Bonus</button>
                </div>

                <div class="card">
                    <h3 class="card-title"><i data-lucide="history" style="color: var(--primary);"></i> Legend Progress</h3>
                    <div id="xp-history">
                        <!-- Himanshu will populate this -->
                        <div style="padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: 600; font-size: 0.9rem;">Project Base Complete</div>
                                <div class="text-muted text-small">Initial seeding</div>
                            </div>
                            <span style="color: var(--primary); font-weight: 700;">+50 XP</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
    <script src="js/gamification.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
